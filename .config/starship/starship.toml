add_newline = false
command_timeout = 1000

format = """
$directory\
$git_branch\
$git_status\
$fill\
$aws\
$docker_context\
$line_break\
$character
"""

right_format = """
$cmd_duration\
$python\
$nodejs\
$lua\
$rust\
$golang\
$jobs\
$time
"""

palette = "catppuccin_mocha"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вң—](bold red)"
vicmd_symbol = "[N] >>>"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[directory]
style = "bold lavender"
format = "[$path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"
truncate_to_repo = false

[directory.substitutions]
Documents = "у°Ҳҷ"
Downloads = "пҖҷ"
Music = "пҖҒ"
Pictures = "пҖҫ"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[git_branch]
symbol = "пҗҳ "
style = "green"
format = "[$symbol$branch]($style) "

[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style)) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Fill в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[fill]
symbol = " "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Languages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[python]
symbol = "оҲө "
style = "teal"
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'

[nodejs]
symbol = "оңҳ "
style = "blue"

[lua]
symbol = "оҳ  "
style = "blue"

[golang]
symbol = "оҳ§ "
style = "cyan"

[rust]
symbol = "оһЁ "
style = "orange"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ AWS / Docker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[aws]
symbol = "оҢҪ "
style = "yellow"
format = "[$symbol($profile )]($style)"

[docker_context]
symbol = "пҢҲ "
style = "blue"
format = "[$symbol]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Jobs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[jobs]
symbol = "пҖ“ "
style = "red"
number_threshold = 1
format = "[$symbol]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Command Duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[cmd_duration]
min_time = 500
style = "yellow"
format = "[$duration]($style) "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[time]
disabled = false
format = "[$time]($style)"
time_format = "%H:%M"
style = "dimmed white"

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ OS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

[os]
disabled = false
style = "bold blue"

[os.symbols]
Macos = "п…№ "

# в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ Catppuccin Mocha Palette в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

